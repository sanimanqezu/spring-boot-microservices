<div class="container">
  <app-alert *ngIf="alertMessage" [message]="alertMessage" [type]="alertType"></app-alert>
  <h1>{{ title }} Management</h1>
  <app-data-table
    [data]="myData"
    [title]="title"
    [headers]="headers"
    [isLoading]="isLoading"
    (saveObjectEvent)="handleSave($event)"
    (updateObjectEvent)="handleUpdate($event)"
    (deleteObjectEvent)="handleDelete($event)"
  ></app-data-table>
</div>
